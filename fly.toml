app = "gdoc-mcp-alejo"
primary_region = "iad"

[build]

[env]
  DATA_DIR = "/data"
  PUBLIC_URL = "https://gdoc-mcp-alejo.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "gdoc_data"
  destination = "/data"

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/health"
